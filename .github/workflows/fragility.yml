name: fragility
on:
  schedule:
    - cron: '0 1 * * 1'        # 每週一 01:00 UTC ≈ 台灣週一 09:00
  workflow_dispatch:            # 也可在 Actions 分頁手動按 Run
permissions:
  contents: write               # 讓 Action 把 fragility.json 推回 repo
  issues: write                 # 脆弱時開 issue 通知(會寄信給你)
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install --quiet pandas numpy yfinance
      - run: python fragility_dashboard.py --watch
      - name: commit fragility.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fragility.json
          git commit -m "weekly fragility update" || echo "no change"
          git push
      - name: alert only if any ticker fragile (>= 4)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          hi=$(python -c "import json;d=json.load(open('fragility.json'));xs=[i for i in d['items'] if i['total']>=4];print(' / '.join(f\"{i['name']} {i['total']}/10\" for i in xs))")
          if [ -n "$hi" ]; then
            gh issue create --title "⚠️ 脆弱度升高" \
              --body "以下標的 ≥4/10: ${hi}。提醒:這是狀態不是時點,分批回應、別預測哪天。詳見 https://easychiu.github.io/stockgoodluck/"
          else
            echo "all calm, no alert"
          fi
